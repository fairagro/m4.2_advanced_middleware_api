services:
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER
      - RABBITMQ_DEFAULT_PASS
    healthcheck:
      test: ["CMD", "rabbitmqctl", "status"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  couchdb:
    image: couchdb:3.3
    ports:
      - "5984:5984"
    environment:
      - COUCHDB_USER
      - COUCHDB_PASSWORD
    volumes:
      - couchdb_data:/opt/couchdb/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5984/_up"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  celery-worker:
    image: middleware-api:latest
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    depends_on:
      rabbitmq:
        condition: service_healthy
      middleware-api:
        condition: service_started
    environment:
      - MIDDLEWARE_API_CONFIG=/run/secrets/middleware-api-config
      - CELERY_BROKER_URL
      - GITLAB_API_TOKEN
      - GIT_REPO_TOKEN
      - COUCHDB_URL=http://couchdb:5984
      - COUCHDB_USER
      - COUCHDB_PASSWORD
    volumes:
      - ./middleware-api-config.yaml:/run/secrets/middleware-api-config:ro
    # Command to run celery worker
    command: [
      "/api/middleware-api/middleware-api",
      "celery",
      "-A", "middleware.api.worker.celery_app:celery_app",
      "worker",
      "--loglevel=info",
      "--concurrency=8",]
    restart: unless-stopped

  middleware-api:
    image: middleware-api:latest
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    depends_on:
      rabbitmq:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      - CELERY_BROKER_URL
      - MIDDLEWARE_API_CONFIG=/run/secrets/middleware-api-config
      - COUCHDB_URL=http://couchdb:5984
      - COUCHDB_USER
      - COUCHDB_PASSWORD
    volumes:
      - ./middleware-api-config.yaml:/run/secrets/middleware-api-config:ro
    # Run bundled middleware-api binary (runtime image does not include uv)
    command: [
      "/api/middleware-api/middleware-api",
      "--host",
      "0.0.0.0",
      "--port",
      "8000",
    ]
    # command: sleep 3600
    restart: unless-stopped

# secrets:
#   client_key:
#     environment: data

volumes:
  couchdb_data:
