name: Reusable Code Quality

permissions:
  contents: read

on:
  workflow_call:
    inputs:
      components:
        description: 'A JSON string array of components to check'
        required: false
        type: string
        default: '["api"]'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  code-quality:
    name: Code Quality Check
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.12']
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --dev --all-packages

      - name: Code formatting and linting
        run: |
          uv run ruff format --check --diff middleware/
          uv run ruff check middleware/
          uv run pylint middleware/
          uv run mypy middleware/

      - name: Security check with bandit
        run: |
          uv run bandit -r middleware/ -c .bandit -f json -o bandit-report.json || true
          python3 -c "
          import json, sys
          with open('bandit-report.json') as f:
              data = json.load(f)
          for r in data.get('results', []):
              print(f\"  [{r['issue_severity']:6}] {r['filename']}:{r['line_number']}: {r['issue_text']}\")
          t = data.get('metrics', {}).get('_totals', {})
          low  = int(t.get('SEVERITY.LOW',    0) or 0)
          med  = int(t.get('SEVERITY.MEDIUM', 0) or 0)
          high = int(t.get('SEVERITY.HIGH',   0) or 0)
          print(f'Bandit findings: LOW={low}, MEDIUM={med}, HIGH={high}')
          if med + high > 0:
              print(f'Failing: {med + high} MEDIUM/HIGH finding(s) found.')
              sys.exit(1)
          "

      - name: Run tests
        run: uv run pytest middleware/ -v --junitxml=pytest-report.xml
